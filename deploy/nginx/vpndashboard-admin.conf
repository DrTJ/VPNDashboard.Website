map $http_upgrade $connection_upgrade_admin {
    default upgrade;
    '' close;
}

server {
    listen 5050;
    listen [::]:5050;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:5051;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_admin;
        # Use $http_host (preserves the client's port, e.g. :5050) instead of
        # $host (hostname only). Otherwise ASP.NET builds redirect URLs without
        # the port and bounces users from :5050/ to the Website on :80.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 100s;
        proxy_buffering off;
    }
}
